<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koda - Tactical Search</title>
    <style>
        /* Estética Militar - Koda v1.1 */
        body {
            background-color: #050a05;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-shadow: 0 0 5px #00ff41;
        }

        .hud-container {
            border: 2px solid #00ff41;
            padding: 25px;
            background: rgba(0, 40, 0, 0.2);
            box-shadow: inset 0 0 20px #00ff41;
            width: 90%;
            max-width: 450px;
            position: relative;
        }

        .header { border-bottom: 2px solid #00ff41; padding-bottom: 10px; margin-bottom: 15px; font-weight: bold; }

        /* Buscador */
        .search-box {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }

        input {
            background: black;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 8px;
            flex-grow: 1;
            font-family: 'Courier New', monospace;
            outline: none;
        }

        button {
            background: #004400;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 8px 15px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: 0.3s;
        }

        button:hover { background: #00ff41; color: black; }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            border-bottom: 1px solid rgba(0, 255, 65, 0.1);
        }

        .label { opacity: 0.6; }
        #status { font-weight: bold; }
        .online { color: #00ff41; }
        .offline { color: #ff0000; }

        .scanline {
            width: 100%; height: 2px;
            background: rgba(0, 255, 65, 0.05);
            position: absolute; top: 0; left: 0;
            animation: moveScan 4s linear infinite;
        }
        @keyframes moveScan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <div class="hud-container">
        <div class="scanline"></div>
        <div class="header">> KODA_RADAR_SCANNER</div>
        
        <div class="search-box">
            <input type="text" id="target-ip" placeholder="IP:PUERTO (Ej: 45.235.98.62:27015)">
            <button onclick="fetchServer()">SCAN</button>
        </div>

        <div class="data-row"><span class="label">STATUS:</span><span id="status">READY</span></div>
        <div class="data-row"><span class="label">MAP_DIR:</span><span id="map">---</span></div>
        <div class="data-row"><span class="label">REGION:</span><span id="region">---</span></div>
        <div class="data-row"><span class="label">SECURE:</span><span id="vac">---</span></div>
        <div class="data-row"><span class="label">PROTO:</span><span id="proto">---</span></div>

        <div style="font-size: 0.7em; margin-top: 15px; opacity: 0.4;">
            LAST_UPDT: <span id="clock">--:--:--</span>
        </div>
    </div>

    <script>
        const PROXY = "https://koda-proxy.proyectosapps50.workers.dev/";

        async function fetchServer() {
            const inputVal = document.getElementById('target-ip').value;
            const statusEl = document.getElementById('status');
            
            if(!inputVal) return alert("Ingresa una IP");

            // Separar IP y puerto
            const parts = inputVal.split(':');
            const ip = parts[0];
            const port = parts[1] || '27015';

            statusEl.innerText = "SCANNING...";
            statusEl.className = "";

            try {
                const response = await fetch(`${PROXY}?host=${ip}&port=${port}`);
                const data = await response.json();

                if (data.response && data.response.servers && data.response.servers.length > 0) {
                    const s = data.response.servers[0];
                    statusEl.innerText = "ONLINE";
                    statusEl.className = "online";
                    document.getElementById('map').innerText = s.gamedir.toUpperCase();
                    document.getElementById('region').innerText = s.region === -1 ? "LATAM/GLOBAL" : s.region;
                    document.getElementById('vac').innerText = s.secure ? "VAC_ACTIVE" : "NO_VAC";
                    document.getElementById('proto').innerText = "G-SOURCE";
                } else {
                    statusEl.innerText = "NO_SIGNAL";
                    statusEl.className = "offline";
                }
            } catch (err) {
                statusEl.innerText = "COMMS_ERROR";
                statusEl.className = "offline";
            }
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }
    </script>
</body>
</html>
