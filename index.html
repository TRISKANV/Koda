<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Koda - Terminal Táctica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d0e10; --panel: #16171d; --accent: #ff8c00; --online: #00ff41; }
        body { background-color: var(--bg); color: #efefef; font-family: 'JetBrains Mono', monospace; }
        
        /* Botones de Categoría */
        .category-btn img { 
            border: 1px solid #333; filter: grayscale(1) opacity(0.4); 
            transition: all 0.3s; width: 80px; height: 100px; object-fit: cover; border-radius: 8px;
        }
        .category-btn.active img { 
            filter: grayscale(0) opacity(1); border: 2px solid var(--accent);
            box-shadow: 0 0 15px rgba(255, 140, 0, 0.3); transform: translateY(-3px);
        }

        /* Tarjetas de Servidor */
        .server-card {
            background: var(--panel); border: 1px solid #2a2c33; border-left: 4px solid #333;
            transition: all 0.3s ease; position: relative;
        }
        .server-card.online { border-left-color: var(--online); }
        .server-card.offline { border-left-color: #ff3e3e; }

        .map-badge {
            background: rgba(255, 140, 0, 0.1); color: var(--accent);
            padding: 1px 6px; font-size: 9px; font-weight: 800; border: 1px solid rgba(255, 140, 0, 0.3);
            text-transform: uppercase;
        }

        .valve-title { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinning { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="p-4 max-w-2xl mx-auto">

    <header class="mb-6 flex justify-between items-start">
        <div>
            <h1 class="text-3xl font-black italic valve-title text-white">KODA</h1>
            <div class="h-1 w-16 bg-orange-600 mt-1"></div>
        </div>
        <div class="text-right">
            <p id="clock" class="text-[10px] text-orange-500 font-bold">--:--:--</p>
            <p class="text-[8px] text-gray-600 uppercase tracking-widest">SISTEMA ACTIVO</p>
        </div>
    </header>

    <section class="flex gap-3 overflow-x-auto pb-4 no-scrollbar">
        <div onclick="setFilter('cs16')" class="category-btn active cursor-pointer flex-shrink-0" id="btn-cs16">
            <img src="https://steamcdn-a.akamaihd.net/steam/apps/10/header.jpg" alt="CS 1.6">
            <p class="text-[9px] mt-1 text-center font-bold opacity-50 uppercase">1.6</p>
        </div>
        <div onclick="setFilter('csgo')" class="category-btn cursor-pointer flex-shrink-0" id="btn-csgo">
            <img src="https://steamcdn-a.akamaihd.net/steam/apps/730/header.jpg" alt="CS:GO">
            <p class="text-[9px] mt-1 text-center font-bold opacity-50 uppercase">GO</p>
        </div>
        <div onclick="setFilter('hl')" class="category-btn cursor-pointer flex-shrink-0" id="btn-hl">
            <img src="https://steamcdn-a.akamaihd.net/steam/apps/70/header.jpg" alt="HL">
            <p class="text-[9px] mt-1 text-center font-bold opacity-50 uppercase">HL</p>
        </div>
        <div onclick="setFilter('tf2')" class="category-btn cursor-pointer flex-shrink-0" id="btn-tf2">
            <img src="https://steamcdn-a.akamaihd.net/steam/apps/440/header.jpg" alt="TF2">
            <p class="text-[9px] mt-1 text-center font-bold opacity-50 uppercase">TF2</p>
        </div>
    </section>

    <section class="space-y-2 mb-6">
        <input type="text" id="ip-input" placeholder="IP:PUERTO (EJ: 45.235.98.62:27015)" 
            class="w-full p-3 bg-[#111216] border border-[#2a2c33] rounded text-orange-500 font-bold text-sm outline-none">
        
        <div class="flex gap-2">
            <button onclick="addServer()" class="flex-1 py-2 bg-orange-600 text-white font-black rounded uppercase text-[10px] tracking-widest">Vincular Nodo</button>
            <button onclick="refreshAll()" class="px-4 bg-[#1a1c22] border border-gray-800 text-white rounded hover:bg-gray-800">
                <span id="refresh-icon" class="inline-block">🔄</span>
            </button>
        </div>
    </section>

    <div id="server-list" class="space-y-3"></div>

    <script>
        let currentFilter = 'cs16';
        const PROXY_URL = "https://koda-proxy.proyectosapps50.workers.dev/";
        
        const GAME_ICONS = {
            'cs16': 'https://steamcdn-a.akamaihd.net/steam/apps/10/header.jpg',
            'csgo': 'https://steamcdn-a.akamaihd.net/steam/apps/730/header.jpg',
            'hl': 'https://steamcdn-a.akamaihd.net/steam/apps/70/header.jpg',
            'tf2': 'https://steamcdn-a.akamaihd.net/steam/apps/440/header.jpg'
        };

        // Reloj
        setInterval(() => { 
            const clock = document.getElementById('clock');
            if(clock) clock.innerText = new Date().toLocaleTimeString(); 
        }, 1000);

        document.addEventListener('DOMContentLoaded', refreshAll);

        function setFilter(game) {
            currentFilter = game;
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('btn-' + game);
            if(btn) btn.classList.add('active');
            refreshAll();
        }

        function addServer() {
            const input = document.getElementById('ip-input');
            const ip = input.value.trim();
            if(!ip) return;
            let servers = JSON.parse(localStorage.getItem('koda_storage_v5') || '[]');
            if(!servers.find(s => s.ip === ip)) {
                servers.push({ ip: ip, game: currentFilter });
                localStorage.setItem('koda_storage_v5', JSON.stringify(servers));
            }
            input.value = '';
            refreshAll();
        }

        async function refreshAll() {
            const container = document.getElementById('server-list');
            const icon = document.getElementById('refresh-icon');
            const allServers = JSON.parse(localStorage.getItem('koda_storage_v5') || '[]');
            const filtered = allServers.filter(s => s.game === currentFilter);
            
            if(icon) icon.classList.add('spinning');
            container.innerHTML = '';
            
            if(filtered.length === 0) {
                container.innerHTML = '<p class="text-gray-800 text-center text-[10px] py-10 uppercase font-bold tracking-widest italic">Sector Vacío</p>';
                if(icon) icon.classList.remove('spinning');
                return;
            }

            // Ejecutar todas las consultas en paralelo para mayor velocidad
            await Promise.all(filtered.map(s => renderServerCard(s.ip)));
            if(icon) icon.classList.remove('spinning');
        }

        async function renderServerCard(ipPort) {
            const container = document.getElementById('server-list');
            const [host, port] = ipPort.split(':');
            const card = document.createElement('div');
            card.className = 'server-card p-3 flex items-center justify-between mb-1';
            container.appendChild(card);

            const iconSrc = GAME_ICONS[currentFilter];
            const startTime = Date.now();

            try {
                const res = await fetch(`${PROXY_URL}?host=${host}&port=${port || 27015}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                
                const data = await res.json();
                const latency = Date.now() - startTime;

                // Lógica de extracción flexible basada en tu consola
                let s = null;
                if (data.response && data.response.servers && data.response.servers.length > 0) {
                    s = data.response.servers[0];
                } else if (data.response && !data.response.servers) {
                    s = data.response; 
                }

                if (s && (s.name || s.map)) {
                    const mapName = (s.map || '---').toUpperCase();
                    const serverName = s.name || `SERVER_${host.split('.')[0]}`;
                    const playerCount = s.players !== undefined ? s.players : (s.players_count || 0);
                    const maxPlayers = s.max_players || 32;

                    card.classList.add('online');
                    card.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <img src="${iconSrc}" class="w-12 h-12 rounded border border-gray-800 object-cover flex-shrink-0">
                            <div class="flex flex-col min-w-0">
                                <div class="flex items-center gap-2">
                                    <span class="map-badge">${mapName}</span>
                                    <span class="text-[9px] text-green-500 font-bold">${latency}ms</span>
                                </div>
                                <span class="text-xs font-bold text-white truncate uppercase mt-1">${serverName}</span>
                                <div class="text-[9px] text-gray-500 font-bold uppercase">
                                    <span>${ipPort}</span> 
                                    <span class="text-gray-800 mx-1">|</span> 
                                    <span class="text-orange-500">${playerCount}/${maxPlayers} Jugadores</span>
                                </div>
                            </div>
                        </div>
                        <button onclick="removeServer('${ipPort}')" class="text-gray-700 hover:text-red-500 p-2">✕</button>
                    `;
                } else {
                    throw new Error("No hay datos");
                }
            } catch (error) {
                card.classList.add('offline');
                card.innerHTML = `
                    <div class="flex items-center gap-3 opacity-40">
                        <img src="${iconSrc}" class="w-12 h-12 rounded border border-gray-800 object-cover grayscale flex-shrink-0">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-red-600 font-bold uppercase">Señal Perdida</span>
                            <span class="text-[9px] text-gray-600">${ipPort}</span>
                        </div>
                    </div>
                    <button onclick="removeServer('${ipPort}')" class="text-gray-700 p-2">✕</button>
                `;
            }
        }

        function removeServer(ip) {
            let servers = JSON.parse(localStorage.getItem('koda_storage_v5') || '[]');
            servers = servers.filter(s => s.ip !== ip);
            localStorage.setItem('koda_storage_v5', JSON.stringify(servers));
            refreshAll();
        }
    </script>
</body>
</html>
