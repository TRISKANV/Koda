<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koda - Tactical HUD</title>
    <style>
        /* Estética Militar - Koda v1.0 */
        body {
            background-color: #050a05;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 5px #00ff41;
        }

        .hud-container {
            border: 2px solid #00ff41;
            padding: 30px;
            background: rgba(0, 40, 0, 0.2);
            box-shadow: inset 0 0 20px #00ff41;
            width: 90%;
            max-width: 500px;
            position: relative;
        }

        .header {
            border-bottom: 2px solid #00ff41;
            padding-bottom: 10px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin: 12px 0;
            font-size: 1.1em;
            border-bottom: 1px solid rgba(0, 255, 65, 0.2);
        }

        .label { opacity: 0.7; }

        #status { font-weight: bold; transition: all 0.3s; }
        .online { color: #00ff41; text-shadow: 0 0 10px #00ff41; }
        .offline { color: #ff0000; text-shadow: 0 0 10px #ff0000; }

        /* Efecto de escaneo */
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 65, 0.1);
            position: absolute;
            top: 0;
            left: 0;
            animation: moveScan 4s linear infinite;
        }

        @keyframes moveScan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .footer {
            margin-top: 20px;
            font-size: 0.8em;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="hud-container">
        <div class="scanline"></div>
        <div class="header">
            > KODA_TACTICAL_LINK_RUNNING
        </div>
        
        <div class="data-row">
            <span class="label">TARGET_IP:</span>
            <span id="ip-display">91.201.67.136:27016</span>
        </div>

        <div class="data-row">
            <span class="label">STATUS:</span>
            <span id="status">INITIALIZING...</span>
        </div>

        <div class="data-row">
            <span class="label">MAP_DIR:</span>
            <span id="map">---</span>
        </div>

        <div class="data-row">
            <span class="label">REGION_ID:</span>
            <span id="region">---</span>
        </div>

        <div class="data-row">
            <span class="label">SECURE_VAC:</span>
            <span id="vac">---</span>
        </div>

        <div class="footer">
            LAST_UPDT: <span id="clock">00:00:00</span>
        </div>
    </div>

    <script>
        // Configuración de tu Worker de Cloudflare
        const PROXY = "https://koda-proxy.proyectosapps50.workers.dev/";
        const IP = "91.201.67.136"; // La IP que ya verificamos que responde
        const PORT = "27016";

        async function fetchServer() {
            const statusEl = document.getElementById('status');
            const mapEl = document.getElementById('map');
            const regionEl = document.getElementById('region');
            const vacEl = document.getElementById('vac');
            const clockEl = document.getElementById('clock');

            try {
                // Consultamos a tu propio Worker
                const response = await fetch(`${PROXY}?host=${IP}&port=${PORT}`);
                const data = await response.json();

                if (data.response && data.response.servers && data.response.servers.length > 0) {
                    const s = data.response.servers[0];
                    
                    statusEl.innerText = "ONLINE_LINK_ESTABLISHED";
                    statusEl.className = "online";
                    mapEl.innerText = s.gamedir.toUpperCase();
                    regionEl.innerText = s.region === -1 ? "LATAM/GLOBAL" : s.region;
                    vacEl.innerText = s.secure ? "ACTIVE" : "INACTIVE";
                } else {
                    statusEl.innerText = "SIGNAL_LOST_OFFLINE";
                    statusEl.className = "offline";
                }
            } catch (err) {
                statusEl.innerText = "COMMS_ERROR";
                statusEl.className = "offline";
            }
            clockEl.innerText = new Date().toLocaleTimeString();
        }

        // Ejecutar cada 15 segundos (radar táctico)
        fetchServer();
        setInterval(fetchServer, 15000);
    </script>
</body>
</html>
