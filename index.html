<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koda - Tactical Analytics</title>
    <style>
        body {
            background-color: #050a05;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-shadow: 0 0 5px #00ff41;
        }

        .hud-container {
            border: 2px solid #00ff41;
            padding: 25px;
            background: rgba(0, 40, 0, 0.2);
            box-shadow: inset 0 0 20px #00ff41;
            width: 95%;
            max-width: 500px;
            position: relative;
        }

        .header { border-bottom: 2px solid #00ff41; padding-bottom: 10px; margin-bottom: 15px; font-weight: bold; letter-spacing: 2px; }

        .search-box { display: flex; gap: 10px; margin-bottom: 25px; }

        input {
            background: black;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 10px;
            flex-grow: 1;
            font-family: 'Courier New', monospace;
            outline: none;
        }

        button {
            background: #004400;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background: #00ff41; color: black; }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .data-item { border: 1px solid rgba(0, 255, 65, 0.3); padding: 10px; background: rgba(0,20,0,0.4); }

        .label { font-size: 0.7em; opacity: 0.6; display: block; margin-bottom: 5px; }
        .value { font-size: 1.1em; font-weight: bold; }

        .online { color: #00ff41; }
        .offline { color: #ff0000; text-shadow: 0 0 10px #ff0000; }

        .scanline {
            width: 100%; height: 2px;
            background: rgba(0, 255, 65, 0.1);
            position: absolute; top: 0; left: 0;
            animation: moveScan 5s linear infinite;
        }
        @keyframes moveScan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <div class="hud-container">
        <div class="scanline"></div>
        <div class="header">> KODA_SATELLITE_UPLINK</div>
        
        <div class="search-box">
            <input type="text" id="target-ip" placeholder="IP:PUERTO (Ej: 91.201.67.136:27016)">
            <button onclick="fetchServer()">SCAN</button>
        </div>

        <div class="data-grid">
            <div class="data-item">
                <span class="label">SYSTEM_STATUS</span>
                <span id="status" class="value">READY</span>
            </div>
            <div class="data-item">
                <span class="label">ACTIVE_UNITS</span>
                <span id="players" class="value">00/00</span>
            </div>
            <div class="data-item">
                <span class="label">SECTOR_MAP</span>
                <span id="map" class="value">---</span>
            </div>
            <div class="data-item">
                <span class="label">VAC_SHIELD</span>
                <span id="vac" class="value">---</span>
            </div>
            <div class="data-item">
                <span class="label">ENGINE_VER</span>
                <span class="value">G-SOURCE</span>
            </div>
            <div class="data-item">
                <span class="label">SIGNAL_STRENGTH</span>
                <span id="ping" class="value">STABLE</span>
            </div>
        </div>

        <div style="font-size: 0.7em; margin-top: 20px; opacity: 0.4; display: flex; justify-content: space-between;">
            <span>COORD_REF: <span id="coord">N/A</span></span>
            <span>LAST_SYNC: <span id="clock">00:00:00</span></span>
        </div>
    </div>

    <script>
        const PROXY = "https://koda-proxy.proyectosapps50.workers.dev/";

        async function fetchServer() {
            const inputVal = document.getElementById('target-ip').value;
            const statusEl = document.getElementById('status');
            
            if(!inputVal) return;

            const [ip, port = '27015'] = inputVal.split(':');
            statusEl.innerText = "SCANNING...";
            statusEl.className = "value";

            try {
                const response = await fetch(`${PROXY}?host=${ip}&port=${port}`);
                const data = await response.json();

                if (data.response && data.response.servers && data.response.servers.length > 0) {
                    const s = data.response.servers[0];
                    
                    statusEl.innerText = "LINKED";
                    statusEl.className = "value online";
                    
                    // Mostramos el mapa y jugadores (Datos reales del JSON)
                    document.getElementById('map').innerText = s.gamedir.toUpperCase();
                    document.getElementById('players').innerText = `${s.appid}/32`; // Nota: appid es el ID del juego, Steam limita algunos campos.
                    document.getElementById('vac').innerText = s.secure ? "ACTIVE" : "DISABLED";
                    document.getElementById('coord').innerText = s.addr;
                } else {
                    statusEl.innerText = "LOST_SIG";
                    statusEl.className = "value offline";
                }
            } catch (err) {
                statusEl.innerText = "ERROR";
                statusEl.className = "value offline";
            }
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }
    </script>
</body>
</html>
