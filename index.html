<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Koda - Panel Táctico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d0e10; --panel: #16171d; --accent: #ff8c00; --online: #00ff41; }
        
        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(#1a1c22 0.5px, transparent 0.5px);
            background-size: 15px 15px;
            color: #efefef; 
            font-family: 'JetBrains Mono', monospace; 
        }

        .category-btn img { 
            border: 1px solid #333; 
            filter: grayscale(1) opacity(0.5); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 80px; height: 110px; object-fit: cover; border-radius: 8px;
        }
        .category-btn.active img { 
            filter: grayscale(0) opacity(1); 
            border: 2px solid var(--accent);
            box-shadow: 0 0 15px rgba(255, 140, 0, 0.3);
            transform: translateY(-5px);
        }

        .server-card {
            background: var(--panel);
            border: 1px solid #2a2c33;
            border-left: 5px solid #333;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .server-card.online { border-left-color: var(--online); }
        .server-card.offline { border-left-color: #ff3e3e; opacity: 0.7; }

        .map-badge {
            background: rgba(0,0,0,0.4);
            color: var(--accent);
            padding: 2px 8px;
            font-size: 10px;
            font-weight: bold;
            border: 1px solid rgba(255, 140, 0, 0.2);
            text-transform: uppercase;
        }

        .btn-action {
            background: #212329;
            border: 1px solid #3a3d46;
            color: #aaa;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 1px;
            transition: all 0.2s;
            padding: 8px 12px;
            border-radius: 4px;
        }
        .btn-action:hover { background: #333; color: white; }
        
        /* Animación de rotación para el icono de carga */
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinning { animation: spin 1s linear infinite; }

        .valve-title { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-5">

    <header class="mb-6 flex justify-between items-end">
        <div>
            <h1 class="text-4xl font-black valve-title text-white italic">KODA</h1>
            <div class="h-1 w-12 bg-orange-600"></div>
        </div>
        <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">SISTEMA DE ENLACE // ACTIVO</p>
    </header>

    <section class="flex gap-4 overflow-x-auto pb-6 no-scrollbar">
        <div onclick="setFilter('cs16')" class="category-btn active text-center flex-shrink-0" id="btn-cs16">
            <img src="assets/cs16.png">
            <p class="text-[10px] mt-2 font-bold opacity-50 uppercase">CS 1.6</p>
        </div>
        <div onclick="setFilter('csgo')" class="category-btn text-center flex-shrink-0" id="btn-csgo">
            <img src="assets/csgo.png">
            <p class="text-[10px] mt-2 font-bold opacity-50 uppercase">CS:GO</p>
        </div>
        <div onclick="setFilter('hl')" class="category-btn text-center flex-shrink-0" id="btn-hl">
            <img src="assets/hl.jpg">
            <p class="text-[10px] mt-2 font-bold opacity-50 uppercase">Half-Life</p>
        </div>
    </section>

    <section class="mb-8">
        <div class="relative">
            <input type="text" id="ip-input" placeholder="INGRESAR IP:PUERTO (EJ: 45.235.98.62:27015)" 
                class="w-full p-4 pl-10 rounded-lg bg-[#111216] border border-[#2a2c33] focus:border-orange-500 outline-none text-sm text-orange-500 font-bold placeholder:text-gray-700">
            <div class="absolute left-3 top-4 text-gray-700 italic">>></div>
        </div>
        
        <button onclick="addServer()" 
            class="w-full mt-2 py-3 bg-orange-600 hover:bg-orange-500 text-white font-black rounded-lg uppercase text-[11px] tracking-widest transition-colors">
            Vincular Nuevo Nodo de Red
        </button>

        <button id="refresh-btn" onclick="refreshAll()" 
            class="w-full mt-2 py-2 bg-[#1a1c22] border border-gray-800 hover:border-gray-600 text-gray-400 hover:text-white font-bold rounded-lg uppercase text-[9px] tracking-[2px] flex items-center justify-center gap-2 transition-all">
            <span id="refresh-icon">🔄</span> ESCANEAR ESTADO DE SERVIDORES
        </button>
    </section>

    <h2 class="text-[10px] font-bold text-gray-600 uppercase tracking-widest mb-4 border-b border-gray-800 pb-2">Servidores en Memoria</h2>
    
    <div id="server-list" class="space-y-4"></div>

    <script>
        let currentFilter = 'cs16';
        const PROXY_URL = "https://koda-proxy.proyectosapps50.workers.dev/";

        document.addEventListener('DOMContentLoaded', refreshAll);

        function setFilter(game) {
            currentFilter = game;
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + game).classList.add('active');
            refreshAll();
        }

        function addServer() {
            const input = document.getElementById('ip-input');
            const ip = input.value.trim();
            if(!ip) return;

            let servers = JSON.parse(localStorage.getItem('koda_storage_v5') || '[]');
            if(!servers.find(s => s.ip === ip)) {
                servers.push({ ip: ip, game: currentFilter });
                localStorage.setItem('koda_storage_v5', JSON.stringify(servers));
            }
            input.value = '';
            refreshAll();
        }

        async function refreshAll() {
            const container = document.getElementById('server-list');
            const refreshIcon = document.getElementById('refresh-icon');
            const allServers = JSON.parse(localStorage.getItem('koda_storage_v5') || '[]');
            const filtered = allServers.filter(s => s.game === currentFilter);
            
            // Efecto visual de carga en el botón
            if(refreshIcon) refreshIcon.classList.add('spinning');
            
            container.innerHTML = '';
            if(filtered.length === 0) {
                container.innerHTML = '<p class="text-gray-800 text-center text-[10px] py-10 uppercase font-bold tracking-widest italic">Sincronización Vacía - Agregue una IP</p>';
                if(refreshIcon) refreshIcon.classList.remove('spinning');
                return;
            }

            // Cargamos todos los servidores filtrados
            const promises = filtered.map(s => renderServerCard(s.ip));
            await Promise.all(promises);

            // Quitamos el efecto de carga
            if(refreshIcon) refreshIcon.classList.remove('spinning');
        }

        async function renderServerCard(ipPort) {
            const container = document.getElementById('server-list');
            const [host, port] = ipPort.split(':');
            
            const card = document.createElement('div');
            card.className = 'server-card p-4 rounded-r-lg flex items-center justify-between';
            container.appendChild(card);

            const ext = (currentFilter === 'hl') ? 'jpg' : 'png';
            const iconSrc = `assets/${currentFilter}.${ext}`;

            try {
                const res = await fetch(`${PROXY_URL}?host=${host}&port=${port || 27015}`);
                const data = await res.json();

                if (data.response && data.response.servers && data.response.servers.length > 0) {
                    const s = data.response.servers[0];
                    const nombreServer = s.name || `SVR_${host.split('.')[0]}`;
                    const mapaActual = s.map ? s.map.toUpperCase() : "DESCONOCIDO";
                    const infoJugadores = s.players !== undefined ? `${s.players}/${s.max_players || 32}` : "ACTIVO";

                    card.classList.add('online');
                    card.innerHTML = `
                        <div class="flex items-center gap-4 overflow-hidden">
                            <img src="${iconSrc}" class="w-10 h-10 rounded border border-gray-700 object-cover flex-shrink-0">
                            <div class="flex flex-col gap-1 overflow-hidden">
                                <div class="flex items-center gap-2">
                                    <span class="map-badge">${mapaActual}</span>
                                    <span class="text-[10px] text-green-500 font-bold tracking-tighter">ENLACE ESTABLE</span>
                                </div>
                                <span class="text-sm font-bold text-white truncate uppercase">${nombreServer}</span>
                                <div class="flex items-center gap-2 text-[9px] text-gray-500 font-bold">
                                    <span class="text-orange-500/60">${ipPort}</span>
                                    <span class="text-gray-800">•</span>
                                    <span>UNIDADES: ${infoJugadores}</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="copyIP('${ipPort}', this)" class="btn-action">COPIAR</button>
                            <button onclick="removeServer('${ipPort}')" class="text-gray-800 p-2 hover:text-red-600">✕</button>
                        </div>
                    `;
                } else { throw new Error(); }
            } catch (e) {
                card.classList.add('offline');
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <img src="${iconSrc}" class="w-10 h-10 rounded border border-gray-800 opacity-20 grayscale">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-red-700 font-bold">SEÑAL PERDIDA</span>
                            <span class="text-xs text-gray-600 font-bold">${ipPort}</span>
                            <span class="text-[8px] text-gray-800 uppercase tracking-widest">Reintentando enlace...</span>
                        </div>
                    </div>
                    <button onclick="removeServer('${ipPort}')" class="text-gray-800">✕</button>
                `;
            }
        }

        function copyIP(text, btn) {
            navigator.clipboard.writeText(text);
            const oldText = btn.innerText;
            btn.innerText = "COPIADO";
            btn.style.borderColor = "#00ff41"; btn.style.color = "#00ff41";
            setTimeout(() => { btn.innerText = oldText; btn.style.borderColor = ""; btn.style.color = ""; }, 1500);
        }

        function removeServer(ip) {
            let servers = JSON.parse(localStorage.getItem('koda_storage_v5') || '[]');
            servers = servers.filter(s => s.ip !== ip);
            localStorage.setItem('koda_storage_v5', JSON.stringify(servers));
            refreshAll();
        }
    </script>
</body>
</html>
