<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Koda - Terminal Táctica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d0e10; --panel: #16171d; --accent: #ff8c00; --online: #00ff41; }
        body { background-color: var(--bg); color: #efefef; font-family: 'JetBrains Mono', monospace; }
        .category-btn img { border: 1px solid #333; filter: grayscale(1) opacity(0.4); transition: 0.3s; width: 80px; height: 100px; object-fit: cover; border-radius: 8px; }
        .category-btn.active img { filter: grayscale(0) opacity(1); border: 2px solid var(--accent); transform: translateY(-3px); }
        .server-card { background: var(--panel); border: 1px solid #2a2c33; border-left: 4px solid #333; margin-bottom: 8px; }
        .server-card.online { border-left-color: var(--online); }
        .server-card.offline { border-left-color: #ff3e3e; opacity: 0.6; }
        .map-badge { background: rgba(255,140,0,0.1); color: var(--accent); padding: 1px 6px; font-size: 9px; font-weight: 800; border: 1px solid rgba(255,140,0,0.3); text-transform: uppercase; }
        .valve-title { font-family: 'Oswald', sans-serif; letter-spacing: 2px; }
    </style>
</head>
<body class="p-4 max-w-2xl mx-auto">

    <header class="mb-6 flex justify-between items-start">
        <div>
            <h1 class="text-3xl font-black italic valve-title text-white">KODA</h1>
            <div class="h-1 w-16 bg-orange-600 mt-1"></div>
        </div>
        <div class="text-right">
            <p id="clock" class="text-[10px] text-orange-500 font-bold">--:--:--</p>
            <p class="text-[7px] text-gray-600 uppercase tracking-widest">PROTOCOLO DE ENLACE</p>
        </div>
    </header>

    <section class="flex gap-3 overflow-x-auto pb-4">
        <div onclick="setFilter('cs16')" class="category-btn active cursor-pointer flex-shrink-0" id="btn-cs16">
            <img src="https://steamcdn-a.akamaihd.net/steam/apps/10/header.jpg">
            <p class="text-[9px] mt-1 text-center font-bold opacity-50">1.6</p>
        </div>
        <div onclick="setFilter('csgo')" class="category-btn cursor-pointer flex-shrink-0" id="btn-csgo">
            <img src="https://steamcdn-a.akamaihd.net/steam/apps/730/header.jpg">
            <p class="text-[9px] mt-1 text-center font-bold opacity-50">GO</p>
        </div>
        <div onclick="setFilter('hl')" class="category-btn cursor-pointer flex-shrink-0" id="btn-hl">
            <img src="https://steamcdn-a.akamaihd.net/steam/apps/70/header.jpg">
            <p class="text-[9px] mt-1 text-center font-bold opacity-50">HL</p>
        </div>
    </section>

    <section class="mb-6">
        <input type="text" id="ip-input" placeholder="IP:PUERTO" class="w-full p-3 bg-[#111216] border border-[#2a2c33] rounded text-orange-500 font-bold mb-2 outline-none text-sm">
        <button onclick="addServer()" class="w-full py-2 bg-orange-600 text-white font-black rounded uppercase text-[10px]">Vincular Nodo</button>
    </section>

    <div id="server-list" class="space-y-3"></div>

    <script>
        let currentFilter = 'cs16';
        // Nuevo Proxy que no bloquea por CORS
        const PROXY = "https://api.allorigins.win/get?url=";
        const KODA_API = "https://koda-proxy.proyectosapps50.workers.dev/";

        const ICONS = {
            'cs16': 'https://steamcdn-a.akamaihd.net/steam/apps/10/header.jpg',
            'csgo': 'https://steamcdn-a.akamaihd.net/steam/apps/730/header.jpg',
            'hl': 'https://steamcdn-a.akamaihd.net/steam/apps/70/header.jpg'
        };

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        document.addEventListener('DOMContentLoaded', refreshAll);

        function setFilter(game) {
            currentFilter = game;
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + game).classList.add('active');
            refreshAll();
        }

        function addServer() {
            const ip = document.getElementById('ip-input').value.trim();
            if(!ip) return;
            let s = JSON.parse(localStorage.getItem('koda_vFinal') || '[]');
            s.push({ ip: ip, game: currentFilter });
            localStorage.setItem('koda_vFinal', JSON.stringify(s));
            document.getElementById('ip-input').value = '';
            refreshAll();
        }

        async function refreshAll() {
            const container = document.getElementById('server-list');
            const servers = JSON.parse(localStorage.getItem('koda_vFinal') || '[]').filter(x => x.game === currentFilter);
            container.innerHTML = '';
            for (const s of servers) { await render(s.ip); }
        }

        async function render(ipPort) {
            const container = document.getElementById('server-list');
            const card = document.createElement('div');
            card.className = 'server-card p-3 flex items-center justify-between';
            container.appendChild(card);

            const [h, p] = ipPort.split(':');
            const url = encodeURIComponent(`${KODA_API}?host=${h}&port=${p || 27015}`);

            try {
                // Usamos allorigins para saltar el error de CORS que viste en rojo
                const res = await fetch(`${PROXY}${url}`);
                const jsonWrapper = await res.json();
                const data = JSON.parse(jsonWrapper.contents);

                let s = data.response?.servers?.[0] || data.response;

                if (s && (s.name || s.map)) {
                    card.classList.add('online');
                    card.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <img src="${ICONS[currentFilter]}" class="w-12 h-12 rounded object-cover">
                            <div class="flex flex-col min-w-0">
                                <span class="map-badge w-fit">${s.map || '---'}</span>
                                <span class="text-xs font-bold text-white truncate uppercase mt-1">${s.name}</span>
                                <span class="text-[9px] text-gray-500 font-bold tracking-tighter">${ipPort} | ${s.players}/${s.max_players} JUGADORES</span>
                            </div>
                        </div>
                        <button onclick="remove('${ipPort}')" class="text-gray-700 p-2 text-lg">✕</button>
                    `;
                } else { throw new Error(); }
            } catch (e) {
                card.classList.add('offline');
                card.innerHTML = `<div class="p-2 text-[9px] text-red-600 font-bold uppercase tracking-widest">Señal Perdida // ${ipPort}</div>
                                  <button onclick="remove('${ipPort}')" class="text-gray-700 p-2">✕</button>`;
            }
        }

        function remove(ip) {
            let s = JSON.parse(localStorage.getItem('koda_vFinal') || '[]');
            localStorage.setItem('koda_vFinal', JSON.stringify(s.filter(x => x.ip !== ip)));
            refreshAll();
        }
    </script>
</body>
</html>
