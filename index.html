<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koda - Tactical HUD</title>
    <style>
        /* Estilo Militar Base */
        body {
            background-color: #050a05;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-shadow: 0 0 5px #00ff41;
        }

        .hud-container {
            border: 2px solid #00ff41;
            padding: 20px;
            background: rgba(0, 40, 0, 0.2);
            box-shadow: inset 0 0 15px #00ff41;
            width: 80%;
            max-width: 600px;
        }

        .status-online { color: #00ff41; font-weight: bold; }
        .status-offline { color: #ff0000; text-shadow: 0 0 5px #ff0000; }

        .data-row {
            margin: 10px 0;
            border-bottom: 1px dashed rgba(0, 255, 65, 0.3);
            display: flex;
            justify-content: space-between;
        }

        .glitch { animation: scan 2s infinite; }
        @keyframes scan {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="hud-container">
        <h2 class="glitch">SYSTEM: KODA_TACTICAL_MONITOR v1.0</h2>
        <hr>
        
        <div class="data-row">
            <span>TARGET_IP:</span>
            <span id="display-ip">45.235.98.62:27015</span>
        </div>

        <div class="data-row">
            <span>STATUS:</span>
            <span id="server-status">CONNECTING...</span>
        </div>

        <div class="data-row">
            <span>SERVER_ID:</span>
            <span id="server-id">---</span>
        </div>

        <div class="data-row">
            <span>REGION:</span>
            <span id="server-region">UNKNOWN</span>
        </div>

        <div class="data-row">
            <span>PROTOCOL:</span>
            <span id="server-protocol">GOLD-SOURCE</span>
        </div>

        <br>
        <small style="opacity: 0.5;">LAST_SCAN: <span id="last-update">--:--:--</span></small>
    </div>

    <script>
        // CONFIGURACIÓN: Tu Worker de Cloudflare
        const PROXY_URL = "https://koda-proxy.proyectosapps50.workers.dev/";
        const TARGET_IP = "45.235.98.62"; // Podés cambiarla por la IP que quieras
        const TARGET_PORT = "27015";

        async function scanServer() {
            const statusEl = document.getElementById('server-status');
            const idEl = document.getElementById('server-id');
            const regionEl = document.getElementById('server-region');
            const timeEl = document.getElementById('last-update');

            statusEl.innerText = "SCANNING...";

            try {
                // Llamada a tu Worker con los parámetros host y port
                const response = await fetch(`${PROXY_URL}?host=${TARGET_IP}&port=${TARGET_PORT}`);
                const data = await response.json();

                if (data.response && data.response.servers && data.response.servers.length > 0) {
                    const server = data.response.servers[0];
                    
                    statusEl.innerText = "ONLINE";
                    statusEl.className = "status-online";
                    idEl.innerText = server.steamid;
                    regionEl.innerText = server.region === -1 ? "GLOBAL/LATAM" : server.region;
                    
                } else {
                    statusEl.innerText = "OFFLINE/NOT_FOUND";
                    statusEl.className = "status-offline";
                }
            } catch (error) {
                console.error("Scan Error:", error);
                statusEl.innerText = "COMMS_FAILURE";
                statusEl.className = "status-offline";
            }

            timeEl.innerText = new Date().toLocaleTimeString();
        }

        // Iniciar escaneo y repetir cada 20 segundos
        scanServer();
        setInterval(scanServer, 20000);
    </script>
</body>
</html>
